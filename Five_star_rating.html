<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.rating {
  border: none;
  float: left;
}

.rating>input {
  display: none;
}

.rating>label:before {
  margin: 5px;
  font-size: 1.25em;
  font-family: FontAwesome;
  display: inline-block;
  content: "★";
}

.rating>.half:before {
  content: "★";
  position: absolute;
}

.rating>label {
  color: #ddd;
  float: right;
}

.rating>input:checked~label,

/* show gold star when clicked */

.rating:not(:checked)>label:hover,

/* hover current star */

.rating:not(:checked)>label:hover~label {
  color: #ff0000;
}

/* hover previous stars in list */

.rating>input:checked+label:hover,

/* hover current star when changing rating */

.rating>input:checked~label:hover,
.rating>label:hover~input:checked~label,

/* lighten current selection */

.rating>input:checked~label:hover~label {
  color: #ff8080;
}
</style>
</head>
<body>
<h2>Five star rating</h2>
<fieldset class="rating">
    	<input type="radio" id="1star5".../><label for="1star5"></label>
	<input type="radio" id="2star5".../><label for="2star5"></label>
	<input type="radio" id="3star5".../><label for="3star5"></label>
	<input type="radio" id="4star5".../><label for="4star5"></label>
	<input type="radio" id="5star5".../><label for="5star5"></label>
</fieldset>
</body>
</html>
