<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  background-color: lightblue;
}

.snow-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none; /* Allows clicking through the snow */
  z-index: 9999;
}

/* Individual snowflake style */
.snowflake {
  position: absolute;
  top: -10px;
  width: 8px;
  height: 8px;
  font-size: 2em;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: fall linear infinite;
}

/* Falling animation */
@keyframes fall {
  0% { transform: translateY(0); }
  100% { transform: translateY(110vh); }
}

/* Add variety by targeting individual flakes */
.snowflake:nth-child(1) { left: 5%; animation-duration: 5s; animation-delay: 1s; }
.snowflake:nth-child(2) { left: 15%; animation-duration: 8s; animation-delay: 0s; }
.snowflake:nth-child(3) { left: 25%; animation-duration: 6s; animation-delay: 2s; }
.snowflake:nth-child(4) { left: 35%; animation-duration: 5s; animation-delay: 1s; }
.snowflake:nth-child(5) { left: 45%; animation-duration: 8s; animation-delay: 0s; }
.snowflake:nth-child(6) { left: 55%; animation-duration: 6s; animation-delay: 2s; }
.snowflake:nth-child(7) { left: 65%; animation-duration: 5s; animation-delay: 1s; }
.snowflake:nth-child(8) { left: 75%; animation-duration: 8s; animation-delay: 0s; }
.snowflake:nth-child(9) { left: 85%; animation-duration: 6s; animation-delay: 2s; }
.snowflake:nth-child(10) { left: 95%; animation-duration: 6s; animation-delay: 2s; }

.snow-drift {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100px;
  background: white;
  border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  /* Adds a soft shadow for depth */
  box-shadow: 0 -10px 20px rgba(255, 255, 255, 0.5);
}
</style>
</head>
<body>
<h1>Snowflake</h1>
<div class="snow-container">
  <div class="snowflake">❄</div>
  <div class="snowflake">❄</div>
  <div class="snowflake">❄</div>
  <div class="snowflake">❅</div>
  <div class="snowflake">❅</div>
  <div class="snowflake">❅</div>
  <div class="snowflake">❆</div>
  <div class="snowflake">❆</div>
  <div class="snowflake">❆</div>
  <div class="snowflake">❄</div>
  <div class="snow-drift"><div>
</div>  
</body>
</html>
